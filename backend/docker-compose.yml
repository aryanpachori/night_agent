services:
  api:
    image: notifications_agent:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DATABASE_URL: ${DATABASE_URL}
    restart: unless-stopped
    init: true
    env_file:
      - ./.env
    environment:
      API_PORT: 3000
    command: sh -c "npm run db:push && npm run start:api"
    ports:
      - "${HOST_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  worker:
    image: notifications_agent:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DATABASE_URL: ${DATABASE_URL}
    restart: unless-stopped
    init: true
    env_file:
      - ./.env
    environment:
      START_API: "0"
    command: npm run start:worker
